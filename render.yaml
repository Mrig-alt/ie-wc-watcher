services:
  - type: web
    name: world-cup-pairing
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: JOIN_PIN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: LOCK_TEAMS_AT
        value: "2026-06-11T00:00:00Z"
      # VAPID keys intentionally omitted — push notifications not yet implemented.
      # Add VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT here when ready.
