services:
  - type: web
    name: world-cup-pairing
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      # NextAuth v5 uses AUTH_SECRET + AUTH_URL (required for cookie signing)
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      # Legacy names kept for backwards compat
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: JOIN_PIN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: LOCK_TEAMS_AT
        value: "2026-06-11T00:00:00Z"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
