services:
  - type: web
    name: world-cup-pairing
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: JOIN_PIN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: LOCK_TEAMS_AT
        value: "2026-06-11T00:00:00Z"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: "mailto:admin@ie.edu"
      - key: SERPAPI_KEY
        sync: false

  # Syncs live scores + settles bets/predictions every 3 minutes
  - type: cron
    name: sync-scores
    runtime: node
    schedule: "*/3 * * * *"
    buildCommand: echo "no build"
    startCommand: >
      curl -sf -X GET "$APP_URL/api/sync-scores"
      -H "Authorization: Bearer $CRON_SECRET"
      && echo "sync-scores ok" || echo "sync-scores failed"
    envVars:
      - key: APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # Refills every student's tokens on Monday mornings (UTC)
  - type: cron
    name: weekly-token-refill
    runtime: node
    schedule: "0 8 * * 1"
    buildCommand: echo "no build"
    startCommand: >
      curl -sf -X GET "$APP_URL/api/cron/weekly-refill"
      -H "Authorization: Bearer $CRON_SECRET"
      && echo "weekly-refill ok" || echo "weekly-refill failed"
    envVars:
      - key: APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # Sends push notification reminders 30 min before each match (runs hourly)
  - type: cron
    name: match-reminders
    runtime: node
    schedule: "0 * * * *"
    buildCommand: echo "no build"
    startCommand: >
      curl -sf -X GET "$APP_URL/api/cron/match-reminders"
      -H "Authorization: Bearer $CRON_SECRET"
      && echo "match-reminders ok" || echo "match-reminders failed"
    envVars:
      - key: APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false
