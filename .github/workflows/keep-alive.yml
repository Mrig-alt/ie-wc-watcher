name: Keep Render alive + sync scores

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min, independent clock from UptimeRobot
  workflow_dispatch:         # manual trigger from GitHub Actions tab

jobs:
  ping-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (keep-alive)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://wc-syeo.onrender.com/api/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
          fi

      - name: Sync match scores from football-data.org
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://wc-syeo.onrender.com/api/sync-scores)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Sync response ($HTTP_CODE): $BODY"

      - name: Send day-before watch-location reminders
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://wc-syeo.onrender.com/api/cron/watch-reminder)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Watch reminder response ($HTTP_CODE): $BODY"
