name: Keep Render alive

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min, independent clock from UptimeRobot
  workflow_dispatch:         # manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://wc-syeo.onrender.com/api/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
            exit 1
          fi
